<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plantilla de componentes de bootstrap" />
    <meta name="author" content="Arias Emilse" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Plantilla bootstrap</title>
  </head>
  <body>
    <header>
      <nav class="navbar bg-primary navbar-expand-lg">
        <div class="container">
          <a href="../index.html" class="navbar-brand"
            >Plantilla de bootstrap</a
          >
          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#opcionesMenu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="opcionesMenu">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="../index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./grilla.html">Grilla</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./contactos.html">Contactos</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <!-- contenedores -->
      <!-- <section>
        <article class="text-center container mt-4 py-5 rounded-3 mb-5 border">
          <h1>Estilos de Bootstrap</h1>
          <p class="lead">
            Una guía visual para aprender clases de diseño, espaciado y
            componentes.
          </p>
        </article>
    
      </section> -->
      <!-- elementos de bootstrap -->
      <section class="container my-4">
        <!-- Formularios -->
        <section id="forms">
          <h1 class="mb-4">Formularios con Stacks</h1>
          <div class="card p-4 shadow-sm ">
            <form class="vstack gap-3">
              <div class="d-flex flex-column flex-md-row gap-3">
                <div class="flex-grow-1">
                  <label class="form-label fw-bold">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Ej: Juan"
                  />
                </div>
                <div class="flex-grow-1">
                  <label class="form-label fw-bold">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    placeholder="test@ejemplo.com"
                  />
                  
                </div>
              </div>
              <div>
                <label class="form-label fw-bold">Mensaje</label>
                <textarea class="form-control" rows="3" placeholder="agrega aqui tu mensaje"></textarea>
              </div>
              <div>
                <div class="form-check form-switch">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="flexSwitchCheckDefault"
                  />
                  <label class="form-check-label" for="flexSwitchCheckDefault"
                    >Aceptar términos (Switch)</label
                  >
                </div>
              </div>
              <div>
                <button type="button" class="btn btn-primary px-5 w-auto">
                  Enviar
                </button>
              </div>
            </form>
          </div>
        </section>
      </section>
    </main>
    <footer class="text-center bg-dark-subtle py-4">
      <p>&copy; Todos los derechos reservados 2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
